<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glowing Jellyfish Discord Token Grabber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="discord-token-login-popup">
  <div class="container">
    <div class="bg-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <div class="card">
      <div class="header">
        <div class="logo-container">
          <i class="fa-brands fa-discord discord-logo"></i>
        </div>
        <h1 class="title">Token Grabber</h1>
        <p class="subtitle">Get token from your open Discord tab</p>
      </div>

      <div class="input-section">
        <div class="input-wrapper">
          <i class="fa-solid fa-key input-icon"></i>
          <input id="token" class="token token-input" type="text" spellcheck="false" placeholder="Click Get Token to fetch...">
        </div>
      </div>

      <div class="button-section">
        <button class="btn btn-primary getToken copyClipboard">
          <i class="fa-solid fa-bolt btn-icon"></i>
          <span>Get Token</span>
        </button>
      </div>

      <p class="notice">
        Sometimes token shows <span class="notice-red">NULL</span>. Go to
        <a class="notice-link" href="https://discord.com/channels/@me">Profile</a> or reload page.
      </p>
    </div>
  </div>

  <script src="js/jquery.min.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
