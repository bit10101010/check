<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section class="card" id="admin-panel">
      <h1>Admin Panel</h1>
      <p class="subtitle">Welcome to the restricted dashboard.</p>
      <div class="details">
        <div><strong>Logged in as:</strong> <span id="admin-username"></span></div>
        <div><strong>Last login:</strong> <span id="login-time"></span></div>
      </div>
      <button id="logout-btn" class="secondary">Log out</button>
    </section>

    <script src="/admin.js"></script>
  </body>
</html>
