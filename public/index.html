<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Bot Account Recovery</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section class="card">
      <h1>Account Recovery</h1>
      <p class="subtitle">Recover your account with our Discord bot workflow.</p>

      <form id="recovery-form">
        <div class="field">
          <label for="username">Account Username</label>
          <input id="username" name="username" autocomplete="username" required />
        </div>

        <div class="field">
          <label for="discordTag">Discord Tag</label>
          <input id="discordTag" name="discordTag" placeholder="name#1234" required />
        </div>

        <button type="submit">Start Recovery</button>
      </form>

      <p class="error" id="error-msg" aria-live="polite"></p>

      <section class="result hidden" id="result-panel" aria-live="polite">
        <h2>Next steps</h2>
        <ol>
          <li>Open Discord and DM <code>@RecoverLinkBot</code>.</li>
          <li>Send command: <code id="recovery-command"></code></li>
          <li>Wait for bot verification and password reset link.</li>
        </ol>
        <div class="details">
          <div><strong>Ticket:</strong> <span id="ticket-id"></span></div>
          <div><strong>Status:</strong> <span id="ticket-status"></span></div>
        </div>
      </section>
    </section>

    <script src="/app.js"></script>
  </body>
</html>
