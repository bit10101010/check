<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section class="card" id="login-card">
      <h1>Admin Login</h1>
      <form id="login-form">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit">Log in</button>
        <p class="error" id="error-msg" aria-live="polite"></p>
      </form>
    </section>

    <section class="card hidden" id="admin-panel">
      <h2>Admin Panel</h2>
      <p>You are logged in successfully with <code>password123</code>.</p>
      <div class="details">
        <div><strong>Username:</strong> <span id="admin-username"></span></div>
        <div><strong>Password:</strong> <span id="admin-password"></span></div>
      </div>
    </section>

    <script src="/app.js"></script>
  </body>
</html>
